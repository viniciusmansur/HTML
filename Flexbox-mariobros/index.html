<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="banner" class="container">
        <img src="./imagens/logo.png" alt="Super Mario Bros">
    </section>
    <section id="inicio" class="container">
        <a class='botao' href="#personagens">Novo jogo</a>
        <a class='botao' href="#personagens">Carregar jogo</a>
    </section>
    <section id="personagens" class="container">
        <h2>Escolha seu personagem</h2>
        <div class="personagens-lista">
            <div class="personagens-item">
                <img src="./imagens/personagens/mario.jpg" alt="">
                <h4>Mario</h4>
            </div>
            <div class="personagens-item">
                <img src="./imagens/personagens/luigi.jpg" alt="">
                <h4>Luigi</h4>
            </div>
            <div class="personagens-item">
                <img src="./imagens/personagens/yoshi.jpg" alt="">
                <h4>Yoshi</h4>
            </div>
            <div class="personagens-item">
                <img src="./imagens/personagens/toad.jpg" alt="">
                <h4>Toad</h4>
            </div>
        </div>
    </section>
    <section id="poderes" class="container">
        <h2>Escolha seu poder</h2>
        <div class="poder-lista">
            <div class="poder-item">
                <img src="./imagens/poderes/cogumelo-azul.jpg" alt="">
            </div>
            <div class="poder-item">
                <img src="./imagens/poderes/cogumelo-verde.jpg" alt="">
            </div>
            <div class="poder-item">
                <img src="./imagens/poderes/cogumelo-vermelho.jpg" alt="">
            </div>
            <div class="poder-item">
                <img src="./imagens/poderes/cogumelo-voador.jpg" alt="">
            </div>
            <div class="poder-item">
                <img src="./imagens/poderes/estrela.jpg" alt="">
            </div>
            <div class="poder-item">
                <img src="./imagens/poderes/flor-fogo.jpg" alt="">
            </div>
            <div class="poder-item">
                <img src="./imagens/poderes/flor-gelo.jpg" alt="">
            </div>
            <div class="poder-item">
                <img src="./imagens/poderes/pinguim.jpg" alt="">
            </div>
        </div>
    </section>
    <section id="viloes" class="container">
        <h2>Enfrente os inimigos</h2>
        <div class="viloes-lista">
            <div class="mario-item">
                <img src="./imagens/personagens/mario.jpg" alt="">
            </div>
            <div class="vilao-itens">
                <div class="viloes-item">
                    <img src="./imagens/viloes/bowser.jpg" alt="">
                </div>
                <div class="viloes-item">
                    <img src="./imagens/viloes/wario.jpg" alt="">
                </div>
                <div class="viloes-item">
                    <img src="./imagens/viloes/waluigi.jpg" alt="">
                </div>  
                <div class="viloes-item">
                    <img src="./imagens/viloes/drybones.jpg" alt="">   
                </div>
            </div>    
        </div>
    </section>
    <section id="final" class="container">
        <h2>E salve o reino!</h2>
        <div class="final-lista">
            <div class="final-item">
                <img src="./imagens/final/peach.png" alt="">
            </div>
            <div class="final-item">
                <img src="./imagens/final/castelo.png" alt="">
            </div>
            <div class="final-item">
                <img src="./imagens/final/daisy.png" alt="">
            </div>
        </div>
    </section>
</body>
</html>
